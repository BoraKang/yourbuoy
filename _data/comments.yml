why-does-your-supervisor-nag-you:
  - name: 최민경
    date: 2021-05-18   # ⚠️ 임시
    message: |
      이런저런 걱정과 고민으로 검색하던 중 만나게 된 알짜 블로그네요.
      '나를 잃지 말자'는 말에 눈물이 살짝 나네요. 제대로 된 업무 환경에 놓이니
      못하는 게 너무 많아 고민하던 참이었는데, 적어주신 글들이 큰 도움이 됐습니다.
    replies:
      - name: 강보라
        author: true
        date: 2021-05-19   # ⚠️ 임시
        message: |
          안녕하세요 민경님, 좋게 봐주셔서 감사해요.
          저도 사회초년생일 때 여기저기 자료를 찾으며 멘붕했던 터라,
          도움이 되셨다니 제가 더 감사해요. 궁금한 것 있으면 언제든 편하게 말씀 주세요. 화이팅!
  - name: 범범
    date: 2022-03-10   # ⚠️ 임시
    message: |
      회사 들어온 지 나흘 됐는데, 여기 열거된 내용을 거의 다 할 뻔했네요.
      이 글을 직장생활 극 초반에 읽어서 너무 다행입니다!
